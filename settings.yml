# Identité visuelle (référence design — voir src/index.css)
theme:
  concept: "Cabane à pizza au feu de bois, la nuit"
  colors:
    charcoal: "#1a1411"
    bark: "#3a2c22"
    cream: "#f4ead9"
    ember: "#e8541e"
    ember_glow: "#ff7a3d"
    honey: "#f2a83c"
    leaf: "#7a9b54"
  fonts:
    display: "Fraunces"
    body: "Outfit"

seo:
  title: "Kabana Pizz — Pizzas artisanales à Brie-Comte-Robert (77)"
  description: >
    Kabana Pizz, kiosque à pizza à Brie-Comte-Robert (77).
    Pizzas artisanales, pâte fraîche à la main, légumes du jour.
    Sur place, à emporter ou en livraison. Dès 9,50 €.
  locale: "fr_FR"
  structured_data: "Restaurant + Menu + AggregateRating (JSON-LD, injecté au runtime)"

deploy:
  platform: "Vercel"
  framework: "vite"
  node: "20.x"
  output: "dist"
