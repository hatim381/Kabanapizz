# ============================================================
# kabana-pizz — Fichier de configuration de l'établissement
# ------------------------------------------------------------
# Ce fichier centralise les informations modifiables du site.
# Pour mettre à jour les horaires, les prix ou les coordonnées,
# éditez ici ET reportez dans src/data/menu.js (source utilisée
# par l'application React). Ce YAML sert de référence lisible
# et de base pour une future synchronisation automatique / CMS.
# ============================================================

restaurant:
  name: "Kabana Pizz"
  tagline: "La pizza de la cabane, cuite au feu"
  type: "Kiosque à pizza"
  description: >
    Pizzas artisanales, légumes frais coupés du jour,
    pâte travaillée à la main. Délicieux et pas cher.
  founded: 2016

contact:
  phone: "07 71 73 61 15"
  phone_backup: "06 59 51 76 67"
  address:
    street: "14 rue Général Leclerc"
    zip: "77170"
    city: "Brie-Comte-Robert"
    region: "Île-de-France"
    country: "FR"

links:
  website: "https://www.kabanapizz.fr/"
  uber_eats: "https://www.order.store/fr/store/kabana-pizz/G4m5ToisTTacVwuXwAAmmg"
  google_review: "https://g.page/r/CewJhBR5-88MEA0/review"
  facebook: "https://www.facebook.com/kabanapizz"
  flyer_pdf: "https://www.kabanapizz.fr/wp-content/uploads/2026/06/FlyerKabanaPizz.pdf"

# Horaires d'ouverture (format 24h). Laisser vide = fermé.
# slot1 = service du midi, slot2 = service du soir.
hours:
  monday:    { slot1: ["11:30", "14:00"], slot2: ["18:00", "22:30"] }
  tuesday:   { slot1: ["11:30", "14:00"], slot2: ["18:00", "22:30"] }
  wednesday: { slot1: ["11:30", "14:00"], slot2: ["18:00", "22:30"] }
  thursday:  { slot1: ["11:30", "14:00"], slot2: ["18:00", "22:30"] }
  friday:    { slot1: ["11:30", "14:00"], slot2: ["18:00", "23:00"] }
  saturday:  { slot1: [],                 slot2: ["18:00", "23:00"] }
  sunday:    { slot1: [],                 slot2: ["18:00", "22:30"] }

# Carte — prix TTC en euros.
menu:
  pizzas:
    - name: "Cannibale"
      base: "Sauce barbecue"
      ingredients: ["mozzarella", "merguez", "bœuf", "poulet rôti"]
      price: 12.50
      tags: ["spicy", "viande"]
    - name: "Indiana"
      base: "Crème fraîche"
      ingredients: ["mozzarella", "emmental", "poulet rôti", "oignons", "champignons"]
      price: 12.50
      tags: ["crème", "viande"]
    - name: "Kabana"
      base: "Sauce tomate"
      ingredients: ["mozzarella", "peppéroni", "oignons", "poivrons", "olives", "champignons", "viande hachée", "emmental"]
      price: 13.50
      tags: ["signature", "viande"]
      signature: true
    - name: "Chèvre miel"
      base: "Crème fraîche"
      ingredients: ["mozzarella", "fromage de chèvre", "miel"]
      price: 11.50
      tags: ["crème", "végé"]
    - name: "Margarita"
      base: "Sauce tomate"
      ingredients: ["mozzarella", "olives noires", "origan"]
      price: 9.50
      tags: ["tomate", "végé"]
    - name: "Reine"
      base: "Sauce tomate"
      ingredients: ["mozzarella", "jambon", "champignons"]
      price: 11.00
      tags: ["tomate", "viande"]
  drinks:
    - { name: "Canette 33 cl (Coca, Fanta…)", price: 1.50 }
    - { name: "Bouteille de soda", price: 3.00 }
    - { name: "Red Bull 25 cl", price: 2.50 }
    - { name: "Oasis 2 L", price: 3.50 }

# Identité visuelle (référence design — voir src/index.css)
theme:
  concept: "Cabane à pizza au feu de bois, la nuit"
  colors:
    charcoal: "#1a1411"
    bark: "#3a2c22"
    cream: "#f4ead9"
    ember: "#e8541e"
    ember_glow: "#ff7a3d"
    honey: "#f2a83c"
    leaf: "#7a9b54"
  fonts:
    display: "Fraunces"
    body: "Outfit"

seo:
  title: "Kabana Pizz — Pizzas artisanales à Brie-Comte-Robert (77)"
  description: >
    Kabana Pizz, kiosque à pizza à Brie-Comte-Robert (77).
    Pizzas artisanales, pâte fraîche à la main, légumes du jour.
    Sur place, à emporter ou en livraison. Dès 9,50 €.
  locale: "fr_FR"
  structured_data: "Restaurant + Menu + AggregateRating (JSON-LD, injecté au runtime)"

deploy:
  platform: "Vercel"
  framework: "vite"
  node: "20.x"
  output: "dist"
